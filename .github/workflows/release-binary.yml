name: Release binary

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"

concurrency:
  group: release-binary
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
          cache: true

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o mkdocs-server-darwin-arm64  ./cmd
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o mkdocs-server-darwin-amd64  ./cmd
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o mkdocs-server-linux-amd64   ./cmd
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o mkdocs-server-windows-amd64.exe ./cmd

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Latest build ($(date -u +%Y-%m-%d))" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --prerelease \
            mkdocs-server-darwin-arm64 \
            mkdocs-server-darwin-amd64 \
            mkdocs-server-linux-amd64 \
            mkdocs-server-windows-amd64.exe
